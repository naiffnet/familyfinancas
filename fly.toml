# fly.toml app configuration file generated for financeiro-familiar on 2026-07-15T11:29:02-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'financeiro-familiar'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/financeiro.db'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'financeiro_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
