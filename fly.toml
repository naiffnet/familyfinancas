# fly.toml app configuration file generated for financeiro-familiar on 2026-07-15T11:29:02-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'financeiro-familiar'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/financeiro.db'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'financeiro_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false  # Máquina ligada 24/7 — sem delay ao abrir o app
  auto_start_machines = true
  min_machines_running = 1    # Sempre 1 máquina ativa
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
